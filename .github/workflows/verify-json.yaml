name: verify json

on:
  pull_request:
    branches:
      - master

jobs:
  excavate:
    permissions:
      contents: read
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Validator
        uses: ScoopInstaller/GithubActions@162fa9fe9ee81ec7407ba46bc732e211085b552e # main (Nov 25, 2025)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
